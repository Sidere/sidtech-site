<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidtech - Assistência Técnica</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    
</head>

<body> <!-- criei de forma mais rápida: header>img+nav>a*3 -->
    <header class="cabecalho">
        <img class="cabecalho-logo" src="assets/img/Sidtech (2).png" alt="logo sidtech">
        <nav id="navbar">
            <a class="cabecalho-navbar-item">Sobre</a>
            <a class="cabecalho-navbar-item">Serviços</a>
            <a class="cabecalho-navbar-item">Contato</a>
        </nav>
    </header>
    <main class="conteudo-hero">
        <section class="conteudo-principal">
            <div class="conteudo-principal-escrito">
                <h1 class="conteudo-principal-titulo">Sidtech</h1>
                <h2 class="conteudo-principal-subtitulo">Assistência Técnica</h2>
                <p class="conteudo-principal-paragrafo">Assistência especializada em computadores, notebooks, MacBooks
                </p> 
                <p class="conteudo-principal-paragrafo">e consoles. Aqui no site você pode encontrar mais informações sobre</p> 
                <p class="conteudo-principal-paragrafo">os serviços e sobre a nossa assistência.</p>
            </div>
            <button class="conteudo-principal-botao">Consulte seu orçamento</button>
        </section>
        <img class="conteudo-principal-imagem" src="assets/img/logo_site 1.png" alt="logo sidtech"> 
    </main>
    
</body>
</html>
